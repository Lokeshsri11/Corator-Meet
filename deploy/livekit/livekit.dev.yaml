# Local development — paired with docker-compose.dev.yml
# Keys must match .env.development.example

port: 7880
log_level: info

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: false

room:
  auto_create: true
  empty_timeout: 300
  max_participants: 50

keys:
  corator_dev_key: corator_dev_secret_for_local_testing_only_32
